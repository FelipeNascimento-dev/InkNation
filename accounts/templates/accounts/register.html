{% extends "base.html" %}

{% block title %}Cadastrar — InkNation{% endblock %}

{% block content %}
<h1>Criar conta</h1>
<form method="post" class="ink-form">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="ink-btn">Cadastrar</button>
</form>
<p>Já tem conta? <a href="{% url 'accounts:login' %}">Entrar</a></p>
{% endblock %}
